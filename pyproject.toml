[tool.black]
line-length = 88
target-version = ["py310"]

[tool.ruff]
target-version = "py310"
line-length = 88

# 先用“温和规则集”，避免一上来改动太大
[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # import sorting (isort-like)
  "B",   # flake8-bugbear (常见坑)
  "UP",  # pyupgrade (py310 兼容的升级建议)
]
ignore = [
  "E501",  # 行长度交给 Black
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # 允许在包 init 里做导入聚合